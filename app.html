<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Аура — запись</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; font-family:sans-serif; }
  body {
    background:#1a1625; color:#fff; padding:20px;
    background:linear-gradient(160deg,#1a1625,#2a1f3d);
    min-height:100vh;
  }
  h1 { text-align:center; margin-bottom:8px;
    background:linear-gradient(90deg,#a855f7,#ec4899);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    font-size:26px;
  }
  p.sub { text-align:center; color:#aaa; margin-bottom:24px; font-size:14px; }
  label { display:block; margin:14px 0 6px; font-weight:bold; font-size:14px; }
  input, select {
    width:100%; padding:14px; border:none; border-radius:12px;
    background:#2d2640; color:#fff; font-size:15px;
  }
  input:focus, select:focus { outline:2px solid #a855f7; }
  button {
    width:100%; padding:16px; margin-top:24px; border:none;
    border-radius:14px; font-size:16px; font-weight:bold; color:#fff;
    background:linear-gradient(90deg,#a855f7,#ec4899); cursor:pointer;
  }
  button:active { opacity:0.85; }
</style>
</head>
<body>
  <h1>✨ Запишитесь онлайн</h1>
  <p class="sub">Оставьте заявку — мы перезвоним</p>

  <label>Ваше имя</label>
  <input id="name" placeholder="Александров Леон">

  <label>Телефон</label>
  <input id="phone" type="tel" placeholder="+7 900 000 00 00">

  <label>Услуга</label>
  <select id="service">
    <option>💇 Стрижка и укладка</option>
    <option>💅 Маникюр</option>
    <option>💆 Уход за лицом</option>
    <option>🎨 Окрашивание</option>
    <option>👁 Брови и ресницы</option>
  </select>

  <label>Удобные дата и время</label>
  <input id="datetime" placeholder="12 января, 15:00">

  <button onclick="send()">Отправить заявку 💜</button>

<script>
  const tg = window.Telegram.WebApp;
  tg.expand();
  tg.MainButton.hide();

  function send() {
    const data = {
      name: document.getElementById('name').value,
      phone: document.getElementById('phone').value,
      service: document.getElementById('service').value,
      datetime: document.getElementById('datetime').value
    };
    if (!data.name || !data.phone || !data.datetime) {
      tg.showAlert('Заполните все поля!');
      return;
    }
    tg.sendData(JSON.stringify(data));
    tg.close();
  }
</script>
</body>
</html>
